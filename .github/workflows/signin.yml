name: MineBBS Daily Signin

on:
  # 每天 UTC 时间 00:00 运行（北京时间 08:00）
  schedule:
    - cron: '0 0 * * *'
  
  # 允许手动触发工作流
  workflow_dispatch:

jobs:
  signin:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 安装依赖
        run: npm ci



      - name: 执行自动签到
        env:
          # 从 Github Secrets 获取用户凭据
          MINEBBS_EMAIL: ${{ secrets.MINEBBS_EMAIL }}
          MINEBBS_PASSWORD: ${{ secrets.MINEBBS_PASSWORD }}
          MINEBBS_TOTP_SECRET: ${{ secrets.MINEBBS_TOTP_SECRET }}
          MINEBBS_ACCOUNT_NAME: ${{ secrets.MINEBBS_ACCOUNT_NAME || 'Github Actions 账户' }}
          # 跳过随机延迟（测试时使用，生产环境建议设为 false 或不设置）
          MINEBBS_SKIP_DELAY: ${{ secrets.MINEBBS_SKIP_DELAY || 'false' }}
          # 是否启用 WAF 检测（默认启用）
          MINEBBS_ENABLE_WAF: ${{ secrets.MINEBBS_ENABLE_WAF || 'true' }}
        run: node signin-github.js
