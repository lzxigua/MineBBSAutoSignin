name: MineBBS Daily Signin

on:
  # 每天 UTC 时间 00:00 运行（北京时间 08:00）
  schedule:
    - cron: '0 0 * * *'
  
  # 允许手动触发工作流
  workflow_dispatch:

jobs:
  signin:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 获取 www.minebbs.com 的 IP 并写入 hosts
        run: |
         for i in {1..3}; do
         RESPONSE=$(curl -s -H "Authorization: Bearer ${{ secrets.UAPIS_API_KEY }}" \
                 'https://uapis.cn/api/v1/network/dns?domain=www.minebbs.com&type=A')
         IP=$(echo "$RESPONSE" | jq -r '.records[0].target')
         if [ -n "$IP" ] && [ "$IP" != "null" ]; then
         echo "获取到 IP: $IP"
         break
         fi
         echo "第 $i 次尝试失败，等待 2 秒..."
         sleep 2
         done
         if [ -z "$IP" ] || [ "$IP" = "null" ]; then
         echo "最终失败，无法获取 IP"
         exit 1
         fi
         sudo sed -i '/www.minebbs.com/d' /etc/hosts
         echo "$IP www.minebbs.com" | sudo tee -a /etc/hosts

      - name: 执行自动签到
        env:
          # 从 Github Secrets 获取用户凭据
          MINEBBS_COOKIES: ${{ secrets.MINEBBS_COOKIES }}
          MINEBBS_CSRF_TOKEN: ${{ secrets.MINEBBS_CSRF_TOKEN }}
          MINEBBS_ACCOUNT_NAME: ${{ secrets.MINEBBS_ACCOUNT_NAME || 'Github Actions 账户' }}
          # 跳过随机延迟（测试时使用，生产环境建议设为 false 或不设置）
          MINEBBS_SKIP_DELAY: ${{ secrets.MINEBBS_SKIP_DELAY || 'false' }}
        run: node signin-github.js
